<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Faas Vinyl Collection">
<meta name="theme-color" content="#1a1714">
<meta name="description" content="The Faas Vinyl Collection">
<title>Faas Vinyl Collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #1a1714;
    --bg-surface: #231f1b;
    --bg-card: #2c2622;
    --bg-card-hover: #342e28;
    --border: #3d352e;
    --border-light: #4a4038;
    --text-primary: #ede6dd;
    --text-secondary: #a89b8c;
    --text-muted: #756859;
    --accent: #d4883a;
    --accent-glow: #d4883a33;
    --accent-hover: #e09a4e;
    --favorite: #e25555;
    --favorite-glow: #e2555533;
    --genre-rock: #c96b4f;
    --genre-jazz: #5b8a72;
    --genre-electronic: #7b6bbd;
    --genre-hiphop: #c4a24e;
    --genre-folk: #8b7355;
    --genre-soul: #b5648a;
    --genre-punk: #d45d5d;
    --genre-country: #9b8450;
    --genre-classical: #6a8cad;
    --genre-pop: #c47eb5;
    --genre-blues: #4a7a9b;
    --genre-metal: #8a8a8a;
    --genre-ambient: #5a8a8a;
    --genre-rnb: #a06cb0;
    --radius: 6px;
    --radius-lg: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }

  /* === Noise texture overlay === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* === Header === */
  .header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .logo-icon::after {
    content: '';
    width: 14px;
    height: 14px;
    background: var(--bg-deep);
    border-radius: 50%;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1.5px solid var(--bg-deep);
    border-radius: 50%;
    opacity: 0.3;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    align-items: baseline;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* === Controls === */
  .controls {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0.75rem 2rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 16px;
    height: 16px;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box input::placeholder {
    color: var(--text-muted);
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .filter-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--border-light);
    color: var(--text-primary);
    background: var(--bg-card);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg-deep);
    font-weight: 500;
  }

  .filter-btn.fav-filter {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .filter-btn.fav-filter svg {
    width: 13px;
    height: 13px;
  }

  .filter-btn.fav-filter.active {
    background: var(--favorite);
    border-color: var(--favorite);
  }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 10px;
    background: var(--bg-surface);
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .view-btn:first-child { border-right: 1px solid var(--border); }

  .view-btn.active {
    background: var(--bg-card-hover);
    color: var(--accent);
  }

  .view-btn svg { width: 16px; height: 16px; }

  /* === Grid === */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  .grid.list-view {
    grid-template-columns: 1fr;
    gap: 0;
  }

  /* === Card (Grid View) === */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-art {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-surface);
  }

  .card-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover .card-art img {
    transform: scale(1.05);
  }

  /* Vinyl peek on hover */
  .vinyl-disc {
    position: absolute;
    right: -30%;
    top: 50%;
    transform: translateY(-50%);
    width: 85%;
    height: 85%;
    border-radius: 50%;
    background: radial-gradient(circle at center,
      #1a1714 12%,
      #2c2622 13%,
      #1a1714 14%,
      #2c2622 26%,
      #1a1714 27%,
      #2c2622 28%,
      #1a1714 42%,
      #2c2622 43%,
      #1a1714 44%,
      #2c2622 56%
    );
    transition: right 0.4s ease, transform 0.4s ease;
    opacity: 0.9;
    pointer-events: none;
  }

  .vinyl-disc::after {
    content: '';
    position: absolute;
    inset: 38%;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
  }

  .card:hover .vinyl-disc {
    right: -20%;
    transform: translateY(-50%) rotate(20deg);
  }

  .fav-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(26,23,20,0.7);
    backdrop-filter: blur(8px);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.2s;
    z-index: 2;
  }

  .fav-btn:hover { background: rgba(26,23,20,0.9); color: var(--favorite); }
  .fav-btn.favorited { color: var(--favorite); }
  .fav-btn.favorited svg { fill: var(--favorite); }
  .fav-btn svg { width: 16px; height: 16px; }

  .card-info {
    padding: 0.75rem 0.85rem;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-artist {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .genre-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .card-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  /* === List View === */
  .grid.list-view .card {
    border-radius: 0;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .grid.list-view .card:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .grid.list-view .card:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); border-bottom: none; }

  .grid.list-view .card:hover {
    transform: none;
    box-shadow: none;
    background: var(--bg-card-hover);
  }

  .grid.list-view .card-art {
    width: 48px;
    height: 48px;
    aspect-ratio: 1;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .grid.list-view .vinyl-disc { display: none; }

  .grid.list-view .card-info {
    padding: 0;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .grid.list-view .card-text { flex: 1; min-width: 0; }

  .grid.list-view .card-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
  }

  .grid.list-view .card-artist { font-size: 0.78rem; }

  .grid.list-view .card-meta {
    margin-top: 0;
    flex-shrink: 0;
  }

  .grid.list-view .fav-btn {
    position: relative;
    top: auto;
    right: auto;
    background: transparent;
    flex-shrink: 0;
  }

  /* === Empty state === */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.95rem;
  }

  /* === Results count === */
  .results-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .results-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .sort-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 5px 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    cursor: pointer;
    outline: none;
  }

  .sort-select:focus { border-color: var(--accent); }

  /* === Tablet === */
  @media (max-width: 900px) {
    .controls { flex-wrap: wrap; }
    .search-box { min-width: 100%; order: -1; }
    .filter-group { 
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-width: 100%;
      padding-bottom: 2px;
    }
    .filter-group::-webkit-scrollbar { display: none; }
    .filter-group .filter-btn { flex-shrink: 0; }
  }

  /* === Mobile === */
  @media (max-width: 640px) {
    .header {
      padding: 1.25rem 1rem 0.75rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .header h1 { font-size: 1.5rem; }
    .header-stats { gap: 1.25rem; }
    .stat-num { font-size: 1.1rem; }

    .controls {
      padding: 0.5rem 1rem 1rem;
      gap: 0.5rem;
    }

    .search-box input {
      padding: 12px 14px 12px 38px;
      font-size: 1rem; /* prevents iOS zoom */
    }

    .filter-btn {
      padding: 10px 14px;
      font-size: 0.78rem;
    }

    .fav-filter {
      flex-shrink: 0;
    }

    .results-bar { padding: 0 1rem 0.5rem; }

    .grid {
      padding: 0 1rem 2rem;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.65rem;
    }

    .card-info { padding: 0.6rem 0.7rem; }
    .card-title { font-size: 0.85rem; }
    .card-artist { font-size: 0.75rem; }
    .genre-tag { font-size: 0.6rem; }
    .card-year { font-size: 0.65rem; }

    .fav-btn {
      width: 36px;
      height: 36px;
    }
    .fav-btn svg { width: 18px; height: 18px; }

    /* disable hover effects on touch */
    .card:hover { transform: none; box-shadow: none; }
    .card:hover .card-art img { transform: none; }
    .card:hover .vinyl-disc { right: -30%; transform: translateY(-50%); }
    .card:active { transform: scale(0.98); }

    /* list view tweaks */
    .grid.list-view .card { padding: 0.75rem 1rem; gap: 0.75rem; }
    .grid.list-view .card-art { width: 44px; height: 44px; }

    .view-toggle { flex-shrink: 0; }
    .view-btn { padding: 10px 12px; }
  }

  /* === Small phones === */
  @media (max-width: 380px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .card-meta { flex-wrap: wrap; gap: 0.3rem; }
  }

  /* === Touch-friendly: larger tap targets === */
  @media (hover: none) and (pointer: coarse) {
    .filter-btn { min-height: 40px; }
    .fav-btn { width: 40px; height: 40px; }
    .sort-select { min-height: 36px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon"></div>
    <div>
      <h1>Faas <span>Vinyl</span> Collection</h1>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">Records</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="artistCount">0</div>
      <div class="stat-label">Artists</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="favCount">0</div>
      <div class="stat-label">Favorites</div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search artist, album, or genre...">
  </div>
  <div class="filter-group" id="genreFilters">
    <button class="filter-btn active" data-genre="all">All</button>
  </div>
  <button class="filter-btn fav-filter" id="favFilter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    Favorites
  </button>
  <div class="view-toggle">
    <button class="view-btn active" id="gridViewBtn" title="Grid view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </button>
    <button class="view-btn" id="listViewBtn" title="List view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
</div>

<div class="results-bar">
  <span class="results-count" id="resultsCount"></span>
  <select class="sort-select" id="sortSelect">
    <option value="artist-asc">Artist A–Z</option>
    <option value="artist-desc">Artist Z–A</option>
    <option value="album-asc">Album A–Z</option>
    <option value="year-desc">Year (Newest)</option>
    <option value="year-asc">Year (Oldest)</option>
    <option value="added-desc">Recently Added</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
  // ======= MOCK DATA =======
  const GENRE_COLORS = {
    'Rock': 'var(--genre-rock)',
    'Jazz': 'var(--genre-jazz)',
    'Electronic': 'var(--genre-electronic)',
    'Hip-Hop': 'var(--genre-hiphop)',
    'Folk': 'var(--genre-folk)',
    'Soul': 'var(--genre-soul)',
    'Punk': 'var(--genre-punk)',
    'Country': 'var(--genre-country)',
    'Classical': 'var(--genre-classical)',
    'Pop': 'var(--genre-pop)',
    'Blues': 'var(--genre-blues)',
    'Metal': 'var(--genre-metal)',
    'Ambient': 'var(--genre-ambient)',
    'R&B': 'var(--genre-rnb)',
  };

  const mockRecords = [
    { id: 1, title: "Rumours", artist: "Fleetwood Mac", genre: "Rock", year: 1977, favorite: true },
    { id: 2, title: "Kind of Blue", artist: "Miles Davis", genre: "Jazz", year: 1959, favorite: true },
    { id: 3, title: "OK Computer", artist: "Radiohead", genre: "Rock", year: 1997, favorite: false },
    { id: 4, title: "Blue Train", artist: "John Coltrane", genre: "Jazz", year: 1958, favorite: false },
    { id: 5, title: "Discovery", artist: "Daft Punk", genre: "Electronic", year: 2001, favorite: true },
    { id: 6, title: "Illmatic", artist: "Nas", genre: "Hip-Hop", year: 1994, favorite: true },
    { id: 7, title: "Pink Moon", artist: "Nick Drake", genre: "Folk", year: 1972, favorite: false },
    { id: 8, title: "What's Going On", artist: "Marvin Gaye", genre: "Soul", year: 1971, favorite: true },
    { id: 9, title: "London Calling", artist: "The Clash", genre: "Punk", year: 1979, favorite: false },
    { id: 10, title: "Harvest", artist: "Neil Young", genre: "Country", year: 1972, favorite: false },
    { id: 11, title: "In Rainbows", artist: "Radiohead", genre: "Rock", year: 2007, favorite: true },
    { id: 12, title: "Midnight Marauders", artist: "A Tribe Called Quest", genre: "Hip-Hop", year: 1993, favorite: false },
    { id: 13, title: "Debut", artist: "Björk", genre: "Electronic", year: 1993, favorite: false },
    { id: 14, title: "The Rise and Fall of Ziggy Stardust", artist: "David Bowie", genre: "Rock", year: 1972, favorite: true },
    { id: 15, title: "Blonde on Blonde", artist: "Bob Dylan", genre: "Folk", year: 1966, favorite: false },
    { id: 16, title: "Ready to Die", artist: "The Notorious B.I.G.", genre: "Hip-Hop", year: 1994, favorite: false },
    { id: 17, title: "Dummy", artist: "Portishead", genre: "Electronic", year: 1994, favorite: true },
    { id: 18, title: "A Love Supreme", artist: "John Coltrane", genre: "Jazz", year: 1965, favorite: true },
    { id: 19, title: "Abbey Road", artist: "The Beatles", genre: "Rock", year: 1969, favorite: true },
    { id: 20, title: "Wish You Were Here", artist: "Pink Floyd", genre: "Rock", year: 1975, favorite: false },
    { id: 21, title: "Songs in the Key of Life", artist: "Stevie Wonder", genre: "Soul", year: 1976, favorite: true },
    { id: 22, title: "Nevermind", artist: "Nirvana", genre: "Rock", year: 1991, favorite: false },
    { id: 23, title: "Madvillainy", artist: "Madvillain", genre: "Hip-Hop", year: 2004, favorite: true },
    { id: 24, title: "Selected Ambient Works 85-92", artist: "Aphex Twin", genre: "Ambient", year: 1992, favorite: false },
    { id: 25, title: "Purple Rain", artist: "Prince", genre: "Pop", year: 1984, favorite: true },
    { id: 26, title: "Led Zeppelin IV", artist: "Led Zeppelin", genre: "Rock", year: 1971, favorite: false },
    { id: 27, title: "Hounds of Love", artist: "Kate Bush", genre: "Pop", year: 1985, favorite: false },
    { id: 28, title: "Master of Puppets", artist: "Metallica", genre: "Metal", year: 1986, favorite: false },
    { id: 29, title: "Mezzanine", artist: "Massive Attack", genre: "Electronic", year: 1998, favorite: true },
    { id: 30, title: "The Miseducation of Lauryn Hill", artist: "Lauryn Hill", genre: "R&B", year: 1998, favorite: true },
    { id: 31, title: "Remain in Light", artist: "Talking Heads", genre: "Rock", year: 1980, favorite: false },
    { id: 32, title: "Loveless", artist: "My Bloody Valentine", genre: "Rock", year: 1991, favorite: true },
  ];

  // Add staggered "added" dates for sort
  mockRecords.forEach((r, i) => { r.addedIndex = mockRecords.length - i; });

  // ======= STATE =======
  let records = [...mockRecords];
  let favorites = new Set(mockRecords.filter(r => r.favorite).map(r => r.id));
  let searchTerm = '';
  let activeGenre = 'all';
  let showFavsOnly = false;
  let viewMode = 'grid';
  let sortBy = 'artist-asc';
  let artCache = {};

  // ======= iTunes Art Fetcher =======
  async function fetchArt(artist, album) {
    const key = `${artist}-${album}`;
    if (artCache[key]) return artCache[key];
    try {
      const q = encodeURIComponent(`${artist} ${album}`);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=album&limit=1`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        const url = data.results[0].artworkUrl100
          .replace('http://', 'https://')
          .replace('100x100', '300x300');
        artCache[key] = url;
        return url;
      }
    } catch (e) { /* fallback */ }
    artCache[key] = null;
    return null;
  }

  // ======= GENRE FILTERS =======
  function buildGenreFilters() {
    const genres = [...new Set(mockRecords.map(r => r.genre))].sort();
    const container = document.getElementById('genreFilters');
    genres.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.genre = g;
      btn.textContent = g;
      container.appendChild(btn);
    });
    container.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      activeGenre = btn.dataset.genre;
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.genre === activeGenre));
      render();
    });
  }

  // ======= FILTER + SORT =======
  function getFiltered() {
    let list = [...mockRecords];
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      list = list.filter(r =>
        r.title.toLowerCase().includes(s) ||
        r.artist.toLowerCase().includes(s) ||
        r.genre.toLowerCase().includes(s)
      );
    }
    if (activeGenre !== 'all') {
      list = list.filter(r => r.genre === activeGenre);
    }
    if (showFavsOnly) {
      list = list.filter(r => favorites.has(r.id));
    }
    // Sort
    list.sort((a, b) => {
      switch (sortBy) {
        case 'artist-asc': return a.artist.localeCompare(b.artist) || a.title.localeCompare(b.title);
        case 'artist-desc': return b.artist.localeCompare(a.artist) || a.title.localeCompare(b.title);
        case 'album-asc': return a.title.localeCompare(b.title);
        case 'year-desc': return b.year - a.year;
        case 'year-asc': return a.year - b.year;
        case 'added-desc': return a.addedIndex - b.addedIndex;
        default: return 0;
      }
    });
    return list;
  }

  // ======= RENDER =======
  function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('grid');
    grid.className = viewMode === 'list' ? 'grid list-view' : 'grid';

    // Stats
    document.getElementById('totalCount').textContent = mockRecords.length;
    document.getElementById('artistCount').textContent = new Set(mockRecords.map(r => r.artist)).size;
    document.getElementById('favCount').textContent = favorites.size;
    document.getElementById('resultsCount').textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <p>No records match your search.</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map((r, i) => {
      const isFav = favorites.has(r.id);
      const color = GENRE_COLORS[r.genre] || 'var(--text-muted)';
      return `
        <div class="card" style="animation-delay: ${Math.min(i * 0.04, 0.6)}s" data-id="${r.id}">
          <div class="card-art" id="art-${r.id}">
            <div class="vinyl-disc"></div>
            <button class="fav-btn ${isFav ? 'favorited' : ''}" data-fav="${r.id}" title="Toggle favorite">
              <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
          </div>
          <div class="card-info">
            <div class="card-text">
              <div class="card-title" title="${r.title}">${r.title}</div>
              <div class="card-artist">${r.artist}</div>
            </div>
            <div class="card-meta">
              <span class="genre-tag" style="background: ${color}22; color: ${color}">${r.genre}</span>
              <span class="card-year">${r.year}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    // Load art
    filtered.forEach(r => loadArt(r));
  }

  async function loadArt(record) {
    const container = document.getElementById(`art-${record.id}`);
    if (!container) return;
    const existing = container.querySelector('img');
    if (existing) return;

    const url = await fetchArt(record.artist, record.title);
    const el = document.getElementById(`art-${record.id}`);
    if (!el) return;
    if (url) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = `${record.title} by ${record.artist}`;
      img.loading = 'lazy';
      el.insertBefore(img, el.firstChild);
    } else {
      // Fallback colored placeholder
      const color = GENRE_COLORS[record.genre] || 'var(--accent)';
      const placeholder = document.createElement('div');
      placeholder.style.cssText = `width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, ${color}33, var(--bg-surface));`;
      placeholder.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1" opacity="0.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`;
      el.insertBefore(placeholder, el.firstChild);
    }
  }

  // ======= EVENT LISTENERS =======
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    render();
  });

  document.getElementById('favFilter').addEventListener('click', function() {
    showFavsOnly = !showFavsOnly;
    this.classList.toggle('active', showFavsOnly);
    render();
  });

  document.getElementById('grid').addEventListener('click', e => {
    const favBtn = e.target.closest('.fav-btn');
    if (favBtn) {
      e.stopPropagation();
      const id = parseInt(favBtn.dataset.fav);
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      render();
    }
  });

  document.getElementById('gridViewBtn').addEventListener('click', function() {
    viewMode = 'grid';
    this.classList.add('active');
    document.getElementById('listViewBtn').classList.remove('active');
    render();
  });

  document.getElementById('listViewBtn').addEventListener('click', function() {
    viewMode = 'list';
    this.classList.add('active');
    document.getElementById('gridViewBtn').classList.remove('active');
    render();
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    sortBy = e.target.value;
    render();
  });

  // ======= INIT =======
  buildGenreFilters();
  render();
</script>
</body>
</html>
